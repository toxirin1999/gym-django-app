{% extends 'base.html' %}

{% block title %}Asignar Programa — {{ programa.nombre }}{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:600px;">
    <div class="mb-4">
        <a href="javascript:history.back()" class="text-muted small">
            <i class="fas fa-arrow-left me-1"></i> Volver
        </a>
        <h1 class="h3 mt-2 fw-bold">Asignar Programa</h1>
        <p class="text-muted">Selecciona el cliente que recibirá el programa <strong>{{ programa.nombre }}</strong>.</p>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="cliente_id" class="form-label fw-semibold">Cliente</label>
                    <select name="cliente_id" id="cliente_id" class="form-select" required>
                        <option value="">— Selecciona un cliente —</option>
                        {% for cliente in clientes %}
                        <option value="{{ cliente.id }}">{{ cliente.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Asignar programa</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
