{% extends 'base.html' %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="py-5">
        <div style="font-size:4rem;">⚠️</div>
        <h2 class="mt-3 fw-bold">Ha ocurrido un error</h2>
        {% if error %}
        <p class="text-muted mt-2 font-monospace">{{ error }}</p>
        {% endif %}
        <a href="javascript:history.back()" class="btn btn-outline-secondary mt-3 me-2">Volver</a>
        <a href="/" class="btn btn-primary mt-3">Ir al inicio</a>
    </div>
</div>
{% endblock %}
