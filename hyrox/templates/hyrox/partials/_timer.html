<div class="rb-timer" id="rb-timer-{{ card_id }}">
  <div>
    <div class="rb-timer-lbl">Tiempo ejercicio</div>
    <div class="rb-timer-display" id="rb-tdisp-{{ card_id }}" data-secs="0">00:00</div>
  </div>
  <button type="button"
          class="rb-timer-btn rb-timer-btn--start"
          id="rb-tbtn-{{ card_id }}"
          onclick="rbTimerToggle({{ card_id }})"
          title="Iniciar cronómetro">
    <!-- play icon -->
    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
  </button>
  <button type="button"
          class="rb-timer-btn rb-timer-btn--reset"
          onclick="rbTimerReset({{ card_id }})"
          title="Resetear">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
  </button>
</div>
